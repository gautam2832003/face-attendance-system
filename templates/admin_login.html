{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <a href="{{ url_for('index') }}" class="back-link"><i class="fas fa-arrow-left"></i></a>
            <div class="auth-logo"><i class="fas fa-user-shield"></i></div>
            <h1>Admin Login</h1>
            <p>Access the admin dashboard</p>
        </div>
        <form class="auth-form glass" id="login-form" onsubmit="event.preventDefault(); loginAdmin();">
            <div class="input-group">
                <label><i class="fas fa-user-tag"></i> Username</label>
                <input type="text" id="username" placeholder="Enter your username" required>
            </div>
            <div class="input-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn-primary glow-btn">
                <i class="fas fa-sign-in-alt"></i> Login
                <div class="btn-glow"></div>
            </button>
        </form>
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('admin_register') }}">Register here</a></p>
            <p><a href="{{ url_for('index') }}">Back to Home</a></p>
        </div>
    </div>
</div>
<script>
async function loginAdmin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !password) { showNotification('Please fill in all fields', 'error'); return; }
    showLoading();
    try {
        const res = await fetch('{{ url_for("admin_login") }}', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        hideLoading();
        if (res.ok) { showNotification('Login successful!', 'success'); setTimeout(() => { window.location.href = data.redirect; }, 800); }
        else { showNotification(data.error || 'Invalid credentials', 'error'); }
    } catch (err) { hideLoading(); showNotification('Connection error', 'error'); }
}
</script>
{% endblock %}
